<!DOCTYPE html>
<html lang ="es">
<head>

    <title>Document</title>

    <link rel="stylesheet" href="app.css">
</head>

<body>

    
    <!--Aquí se muestra el nombre del usuario-->

    <button id="btnActualizar">Actualizar Nombre</button>

    <p></p>

    <input type="number" id="inputEdad" min ="18" max="120" placeholder="Escribe la nueva edad">

    <p></p>

    <!--Ciudad del usuario-->
    <input type="text" id="inputCiudad" placeholder="Escribe la nueva ciudad">
    <button id="actualizarCiudad">Actualizar Ciudad</button>
    
    <div id="perfil"></div>
    <script src="app.js"></script>
</body>

</html>
